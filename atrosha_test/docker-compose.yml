services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    networks:
      - atrosha-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  bank:
    build:
      context: ./bank
      dockerfile_inline: |
        FROM python:3.9-slim
        WORKDIR /app
        COPY . .
        RUN pip install -r requirements.txt
        EXPOSE 8001
        CMD ["python", "bank.py"]
    ports:
      - "8001:8001"
    restart: always
    networks:
      - atrosha-net

  proxy:
    build:
      context: ./proxy
      dockerfile_inline: |
        FROM rust:latest as builder
        RUN apt-get update && apt-get install -y pkg-config libssl-dev
        WORKDIR /usr/src/proxy
        COPY . .
        RUN cargo build --release

        FROM debian:bookworm-slim
        RUN apt-get update && apt-get install -y libssl-dev ca-certificates && rm -rf /var/lib/apt/lists/*
        WORKDIR /app
        COPY --from=builder /usr/src/proxy/target/release/atrosha_proxy /app/proxy
        COPY budget.json /app/budget.json
        ENV BANK_URL=http://bank:8001
        ENV REDIS_URL=redis://redis:6379
        EXPOSE 8000
        CMD ["./proxy"]
    depends_on:
      redis:
        condition: service_healthy
      bank:
        condition: service_started
    ports:
      - "8000:8000"
    restart: always
    networks:
      - atrosha-net

networks:
  atrosha-net:
    driver: bridge
