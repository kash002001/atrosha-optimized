services:
  # 1. Atrosha Proxy (Public)
  - type: web
    name: atrosha-proxy
    runtime: docker
    dockerfilePath: ./Atrosha/proxy/Dockerfile
    dockerContext: ./Atrosha/proxy
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: redis
          name: atrosha-cache
          property: connectionString
      - key: SEMANTIC_ENGINE_URL
        value: http://atrosha-semantic:8002
      - key: RUST_LOG
        value: atrosha_proxy=info
      - key: PERMIT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true

  # 2. Semantic Engine sidecar (Private)
  - type: worker
    name: atrosha-semantic
    runtime: docker
    dockerfilePath: ./Atrosha/semantic_engine/Dockerfile
    dockerContext: ./Atrosha/semantic_engine
    plan: starter
    envVars:
      - key: PORT
        value: "8002"
      - key: ATROSHA_MODEL_PATH
        value: /app/export/atrosha_engine.onnx
      - key: ATROSHA_TOKENIZER_PATH
        value: /app/tokenizer/tokenizer.json
      - key: SUPABASE_URL
        sync: false  # set manually in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false  # set manually in Render dashboard

# 3. Managed Redis for Rate Limiting
databases:
  - name: atrosha-cache
    type: redis
    plan: starter
    ipAllowList: [] # internal only
