apiVersion: v1
kind: Service
metadata:
  name: {{ include "atrosha.fullname" . }}-intent-validator
  labels:
    {{- include "atrosha.labels" . | nindent 4 }}
    app.kubernetes.io/component: intent-validator
spec:
  type: {{ .Values.intentValidator.service.type }}
  ports:
    - port: {{ .Values.intentValidator.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "atrosha.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: intent-validator
