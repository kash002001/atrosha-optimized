{{- if .Values.anvil.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "atrosha.fullname" . }}-anvil
  labels:
    {{- include "atrosha.labels" . | nindent 4 }}
    app.kubernetes.io/component: anvil
spec:
  type: {{ .Values.anvil.service.type }}
  ports:
    - port: {{ .Values.anvil.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "atrosha.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: anvil
{{- end }}
