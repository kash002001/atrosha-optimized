version: "3.9"

services:
  proxy:
    build: ./proxy
    ports:
      - "8080:10000"
    environment:
      REDIS_URL: redis://redis:6379/
      CLICKHOUSE_URL: http://clickhouse:8123/
      PERMIT_SECRET: ${PERMIT_SECRET:-super-secret-key-change-me}
      SEMANTIC_ENGINE_URL: http://semantic-engine:8002
      RUST_LOG: atrosha_proxy=debug
    depends_on:
      redis:
        condition: service_healthy
      semantic-engine:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:10000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  semantic-engine:
    build: ./semantic_engine
    ports:
      - "8002:8002"
    environment:
      ATROSHA_MODEL_PATH: /app/export/atrosha_engine.onnx
      ATROSHA_TOKENIZER_PATH: /app/tokenizer/tokenizer.json
      SUPABASE_URL: "https://kyocxszsoqwgtqglfmmh.supabase.co"
      SUPABASE_SERVICE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5b2N4c3pzb3F3Z3RxZ2xmbW1oIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NjEyOTkxNiwiZXhwIjoyMDgxNzA1OTE2fQ.l3EQkHDVg7DT5MFe4_2hTQTsoHQIE5itI8n14SsJJXU"
    volumes:
      - ./semantic_engine/export:/app/export:ro
      - ./semantic_engine/tokenizer:/app/tokenizer:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  intent-validator:
    build: ./intent_validator
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379/0
      PERMIT_SECRET: ${PERMIT_SECRET:-super-secret-key-change-me}
      INTENT_TTL: 3600
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  sovereign-agent:
    build: ./sovereign_agent
    ports:
      - "8003:8003"
    environment:
      AGENT_PORT: 8003
      ATROSHA_DB_PATH: /data/atrosha.db
      USE_LLM_FALLBACK: "false"
    volumes:
      - agent-data:/data
    depends_on:
      proxy:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8003/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  agent-data:
    driver: local
